name: IG BOT

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - run: npm init -y

    - run: npm install playwright googleapis @xenova/transformers

    - run: npx playwright install

    - run: node check.js
      env:
        GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
